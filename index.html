<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Goblin</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="settings-container">
      <header class="settings-header">
        <h1>Prompt Goblin</h1>
        <span class="version">v0.1.0</span>
      </header>

      <section class="settings-section">
        <h2>API Key</h2>
        <div class="field">
          <input
            type="password"
            id="api-key-input"
            placeholder="Paste your Gemini API key..."
            spellcheck="false"
            autocomplete="off"
          />
          <button id="toggle-key-visibility" class="icon-btn" title="Toggle visibility">
            <span id="eye-icon">&#x1F441;</span>
          </button>
        </div>
        <div class="status-row">
          <span id="connection-status" class="status-indicator disconnected">
            <span class="status-dot"></span>
            <span class="status-text">Not configured</span>
          </span>
        </div>
      </section>

      <section class="settings-section">
        <h2>Hotkey</h2>
        <div class="hotkey-display">
          <kbd>Alt</kbd> + <kbd>Super</kbd> + <kbd>G</kbd>
        </div>
        <p class="hint">Press the hotkey to start/stop voice recording</p>
      </section>

      <section class="settings-section">
        <h2>Typing Mode</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="typing-mode" value="all_at_once" checked />
            <span>Type all at once</span>
            <span class="badge default">default</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="typing-mode" value="incremental" />
            <span>Type incrementally</span>
            <span class="badge beta">beta</span>
          </label>
        </div>
        <p class="hint" id="typing-mode-hint">
          Text is typed after you stop recording.
        </p>
      </section>

      <section class="settings-section">
        <h2>Voice Detection</h2>
        <label class="checkbox-label">
          <input type="checkbox" id="auto-stop-checkbox" />
          <span>Auto-stop on silence</span>
          <span class="badge beta">beta</span>
        </label>
        <div class="inline-field" id="silence-timeout-field" style="display: none;">
          <label for="silence-timeout">Silence timeout:</label>
          <input
            type="number"
            id="silence-timeout"
            min="0.5"
            max="10"
            step="0.5"
            value="2.0"
          />
          <span class="unit">seconds</span>
        </div>
      </section>

      <section class="settings-section">
        <h2>Language</h2>
        <select id="language-select">
          <option value="auto">Auto-detect</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="nl">Dutch</option>
          <option value="pl">Polish</option>
          <option value="uk">Ukrainian</option>
        </select>
      </section>

      <footer class="settings-footer">
        <button id="save-btn" class="primary-btn">Save</button>
        <span id="save-status" class="save-status"></span>
      </footer>
    </main>
  </body>
</html>
